<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>세꼼 어드민 로그인</title>
<style>
  body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#163300;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#EAF3E1}
  .card{background:#1E4004;border-radius:20px;padding:36px 32px;width:340px;box-shadow:0 8px 40px rgba(0,0,0,.3)}
  h1{font-size:20px;margin:0 0 6px;color:#EAF3E1}
  .sub{font-size:13px;color:#9FBF8F;margin-bottom:22px}
  .acct{background:#163300;border-radius:10px;padding:12px 14px;font-size:14px;color:#9FE870;font-weight:700;margin-bottom:14px;text-align:center}
  button{width:100%;padding:14px 0;border:0;border-radius:12px;background:#9FE870;color:#163300;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px}
  button.ghost{background:transparent;color:#9FBF8F;font-weight:600;font-size:13px}
  button:disabled{opacity:.5;cursor:default}
  input{width:100%;box-sizing:border-box;padding:14px;border:1px solid #2FA968;border-radius:12px;background:#163300;color:#EAF3E1;font-size:20px;letter-spacing:6px;text-align:center;margin-top:14px}
  input::placeholder{letter-spacing:0;font-size:14px;color:#6B8A5E}
  .msg{font-size:13px;min-height:18px;margin-top:12px;color:#F9E795}
  .step2{display:none}
</style>
</head>
<body>
<div class="card">
  <h1>세꼼 어드민</h1>
  <div class="sub">관리자 이메일로 인증번호를 보내드려요.</div>
  <div class="acct">sekkomi.com@gmail.com</div>
  <div class="step1">
    <button id="reqBtn" onclick="requestOtp()">인증번호 이메일로 받기</button>
  </div>
  <div class="step2" id="step2">
    <input id="code" inputmode="numeric" maxlength="6" placeholder="인증번호 6자리">
    <button onclick="verify()">로그인</button>
    <button class="ghost" onclick="requestOtp()">인증번호 다시 받기</button>
  </div>
  <div class="msg" id="msg"></div>
</div>
<script>
const $ = (s) => document.querySelector(s);
async function post(body){
  const r = await fetch("/api/admin-auth", {method:"POST", credentials:"same-origin",
    headers:{"Content-Type":"application/json"}, body: JSON.stringify(body)});
  return r.json();
}
// 이미 로그인돼 있으면 바로 대시보드로
post({action:"check"}).then(r=>{ if(r && r.ok) location.href="/api/list-leads"; }).catch(()=>{});
async function requestOtp(){
  $("#msg").textContent = "발송 중...";
  $("#reqBtn").disabled = true;
  try{
    const r = await post({action:"request"});
    if(r.ok){ $("#msg").textContent = "인증번호를 보냈어요. 메일함을 확인하세요 (10분 유효)."; $("#step2").style.display="block"; $("#code").focus(); }
    else $("#msg").textContent = r.error || "발송 실패";
  }catch(e){ $("#msg").textContent = "네트워크 오류"; }
  setTimeout(()=>{ $("#reqBtn").disabled=false; }, 60000);
}
async function verify(){
  const code = $("#code").value.trim();
  if(code.length !== 6){ $("#msg").textContent = "6자리 숫자를 입력하세요"; return; }
  $("#msg").textContent = "확인 중...";
  try{
    const r = await post({action:"verify", code});
    if(r.ok) location.href = "/api/list-leads";
    else $("#msg").textContent = r.error || "인증 실패";
  }catch(e){ $("#msg").textContent = "네트워크 오류"; }
}
document.addEventListener("keydown", (e)=>{ if(e.key==="Enter" && $("#step2").style.display==="block") verify(); });
</script>
</body>
</html>
