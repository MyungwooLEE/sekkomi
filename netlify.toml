# 세꼼 — Netlify 배포 설정
# 정적 사이트(프로토타입 HTML) + 서버리스 함수(이메일)를 한 폴더에서 배포.

[build]
  publish = "public"          # index.html 등 정적 파일 위치
  functions = "netlify/functions"
  # _parts/에 조각이 있으면 빌드 시 index.html을 조립한다 (자동화 도구의 대용량 커밋 한도 우회).
  # 체크섬이 안 맞으면 빌드가 실패해 기존 배포가 유지된다(안전). 검증용 사본을 build-index.sha256로 공개.
  command = "if [ -f _parts/index.sha256 ]; then cat _parts/index.html.part* > public/index.html && echo \"$(cat _parts/index.sha256)  public/index.html\" | sha256sum -c - && cp _parts/index.sha256 public/build-index.sha256; fi"

[functions]
  node_bundler = "esbuild"    # @netlify/blobs import 번들링

# 함수 호출 경로 단축 (선택): /api/send-email → 실제 /.netlify/functions/send-email
[[redirects]]
  from = "/api/send-email"
  to = "/.netlify/functions/send-email"
  status = 200

[[redirects]]
  from = "/api/verify-otp"
  to = "/.netlify/functions/verify-otp"
  status = 200

[[redirects]]
  from = "/api/save-lead"
  to = "/.netlify/functions/save-lead"
  status = 200

[[redirects]]
  from = "/api/list-leads"
  to = "/.netlify/functions/list-leads"
  status = 200

[[redirects]]
  from = "/api/delete-leads"
  to = "/.netlify/functions/delete-leads"
  status = 200

[[redirects]]
  from = "/api/sims"
  to = "/.netlify/functions/sims"
  status = 200
